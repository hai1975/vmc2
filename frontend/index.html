<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%logo.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM Clinic — Voice Form Assistant</title>
    <link rel="preconnect" href="https://vmc-api-u0fk.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://vmc-api-u0fk.onrender.com" />
    <script>
      (function () {
        var api = 'https://vmc-api-u0fk.onrender.com'
        fetch(api + '/api/health', { mode: 'cors', credentials: 'omit' }).catch(function () {})
      })()
    </script>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #f3f6fb;
        transition: opacity 0.25s ease;
      }
      #boot-splash.boot-splash--hide {
        opacity: 0;
        pointer-events: none;
      }
      .boot-splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
      }
      .boot-splash-logo-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
      }
      .boot-splash-logo-wrap::before {
        content: '';
        position: absolute;
        inset: 0;
        border: 3px solid #dbe5f0;
        border-top-color: #c62828;
        border-right-color: #1a6fb3;
        border-radius: 50%;
        animation: boot-ring 1s linear infinite;
      }
      .boot-splash-logo {
        width: 52px;
        height: 52px;
        object-fit: contain;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      .boot-splash-text {
        margin: 0;
        font: 600 1rem/1.4 'Segoe UI', system-ui, sans-serif;
        color: #0f4c81;
      }
      @keyframes boot-ring {
        to { transform: rotate(360deg); }
      }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.92; }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-busy="true">
      <div class="boot-splash-card">
        <div class="boot-splash-logo-wrap">
          <img class="boot-splash-logo" src="%BASE_URL%logo.png" alt="" width="52" height="52" />
        </div>
        <p class="boot-splash-text">VM Clinic</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
