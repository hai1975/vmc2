<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VM Clinic — Voice Form Assistant</title>
    <link rel="preconnect" href="https://vmc-api-u0fk.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://vmc-api-u0fk.onrender.com" />
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #f3f6fb;
        transition: opacity 0.25s ease;
      }
      #boot-splash.boot-splash--hide {
        opacity: 0;
        pointer-events: none;
      }
      .boot-splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
      }
      .boot-splash-logo {
        width: 56px;
        height: 56px;
        animation: boot-spin 1.1s linear infinite;
      }
      .boot-splash-text {
        margin: 0;
        font: 600 1rem/1.4 'Segoe UI', system-ui, sans-serif;
        color: #0f4c81;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-live="polite" aria-busy="true">
      <div class="boot-splash-card">
        <img class="boot-splash-logo" src="%BASE_URL%favicon.svg" alt="" width="56" height="56" />
        <p class="boot-splash-text">VM Clinic</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
