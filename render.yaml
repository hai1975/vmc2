# Render Blueprint — deploy from GitHub: Dashboard → New → Blueprint
services:
  - type: web
    name: vmc-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_LIVE_MODEL
        value: gemini-3.1-flash-live-preview
      - key: CORS_ORIGINS
        value: https://hai1975.com,https://www.hai1975.com
      - key: FORM_DIR
        value: Form
      - key: SCHEMA_DIR
        value: schemas
      - key: DATA_DIR
        value: data
      - key: DATABASE_URL
        value: sqlite:////app/data/vmc.db
